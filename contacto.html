<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="style.css?v=0.3">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html"><img src="img/logo.png" alt="Logo" class="logo-img"></a>
            </div>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li class="emoji-separador">🖋️</li>
                <li><a href="servicios.html">Servicios</a></li>
                <li class="emoji-separador">🎨</li>
                <li><a href="contacto.html">Cotización</a></li>
                <li class="emoji-separador">🎫</li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2>Solicita tu Presupuesto</h2>
        <div class="form-box">
            <form action="https://formspree.io/f/xpqypeyp" method="POST">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" placeholder="Ej. Juan Pérez" required>
                
                <label>Correo Electrónico</label>
                <input type="email" name="email" placeholder="nombre@ejemplo.com" required>
                
                <label>Detalles del Pedido</label>
                <textarea name="detalles" rows="6" placeholder="¿Qué necesitas imprimir? (Cantidades, tamaños, material)" required></textarea>
                
                <button type="submit" class="btn-azul" style="width: 100%;">Enviar Solicitud</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div class="footer-column brand">
                <h4>Artes Gráficas Digitales</h4>
                <p>Calidad que se imprime, detalles que perduran.</p>
            </div>
            <div class="footer-column">
                <h5>Contacto</h5>
                <p>📍 San Salvador, El Salvador</p>
                <p>📞 +503 7873-9695</p>
            </div>
            <div class="footer-column">
                <h5>Horarios</h5>
                <p>Lun - Vie: 8am - 6pm</p>
                <p>Sábados: 9am - 1pm</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Artes Gráficas Digitales</p>
        </div>
    </footer>
</body>
